<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/LOGO.png?v=4" />
  <link rel="shortcut icon" type="image/png" href="/LOGO.png?v=4" />
  <link rel="apple-touch-icon" href="/LOGO.png?v=4" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#F5F7FA" />
  <title>Algartempo Frota - Painel Operacional</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />

  <!-- HERE Maps JavaScript API v3 -->
  <link rel="stylesheet" type="text/css" href="https://js.api.here.com/v3/3.1/mapsjs-ui.css" />
  <script src="https://js.api.here.com/v3/3.1/mapsjs-core.js"></script>
  <script src="https://js.api.here.com/v3/3.1/mapsjs-service.js"></script>
  <script src="https://js.api.here.com/v3/3.1/mapsjs-ui.js"></script>
  <script src="https://js.api.here.com/v3/3.1/mapsjs-mapevents.js"></script>
  <script src="https://js.api.here.com/v3/3.1/mapsjs-clustering.js"></script>

  <script>
    window.onerror = function (msg, source, lineno, colno, error) {
      document.body.innerHTML = '<div style="background:black;color:red;padding:20px;font-family:monospace;z-index:999999;position:fixed;top:0;left:0;width:100%;height:100%;overflow:auto;">' +
        '<h1>CRITICAL STARTUP ERROR</h1>' +
        '<h3>' + msg + '</h3>' +
        '<p>Source: ' + source + ':' + lineno + ':' + colno + '</p>' +
        '<pre>' + (error ? error.stack : 'No stack trace') + '</pre>' +
        '<button onclick="window.location.reload()" style="padding:10px;margin-top:20px;">RELOAD</button>' +
        '</div>';
      return false;
    };
    window.onunhandledrejection = function (event) {
       document.body.innerHTML = '<div style="background:black;color:red;padding:20px;font-family:monospace;z-index:999999;position:fixed;top:0;left:0;width:100%;height:100%;overflow:auto;">' +
        '<h1>UNHANDLED PROMISE REJECTION</h1>' +
        '<h3>' + event.reason + '</h3>' +
        '</div>';
    };
  </script>
</head>

<body>
  <div id="root"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
