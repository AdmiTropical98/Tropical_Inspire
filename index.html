<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon_frota.png?v=1" />
  <link rel="shortcut icon" type="image/png" href="/favicon_frota.png?v=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <title>Tropical Inspire - Gestão de Frota</title>

  <script>
    window.onerror = function (msg, source, lineno, colno, error) {
      document.body.innerHTML = '<div style="background:black;color:red;padding:20px;font-family:monospace;z-index:999999;position:fixed;top:0;left:0;width:100%;height:100%;overflow:auto;">' +
        '<h1>CRITICAL STARTUP ERROR</h1>' +
        '<h3>' + msg + '</h3>' +
        '<p>Source: ' + source + ':' + lineno + ':' + colno + '</p>' +
        '<pre>' + (error ? error.stack : 'No stack trace') + '</pre>' +
        '<button onclick="window.location.reload()" style="padding:10px;margin-top:20px;">RELOAD</button>' +
        '</div>';
      return false;
    };
    window.onunhandledrejection = function (event) {
       document.body.innerHTML = '<div style="background:black;color:red;padding:20px;font-family:monospace;z-index:999999;position:fixed;top:0;left:0;width:100%;height:100%;overflow:auto;">' +
        '<h1>UNHANDLED PROMISE REJECTION</h1>' +
        '<h3>' + event.reason + '</h3>' +
        '</div>';
    };
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
