name: 🚀 Robust Deploy (LFTP)

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy with LFTP
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 🔧 Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build Project
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: 📂 Sync with LFTP
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp
          lftp -c "open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }}; set ssl:verify-certificate no; set ftp:ssl-allow no; mirror -R -v --parallel=4 ./dist /public_html"
